<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartaz QR — Agendamento.pt</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:20px; }
canvas#preview { border-radius:20px; max-width:360px; width:100%; box-shadow:0 30px 80px rgba(0,0,0,.8); }
.btns { display:flex; gap:10px; width:100%; max-width:360px; }
.btn { flex:1; padding:16px; border:none; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer; }
.btn_gold { background:linear-gradient(135deg,#C9A84C,#E8C96A); color:#000; }
.btn_share { background:#1e1e1e; color:#f0f0f0; border:1px solid #2a2a2a; }
#loading { color:#666; font-size:14px; margin-top:20px; }
</style>
</head>
<body>

<div id="loading">A gerar cartaz...</div>
<canvas id="preview" style="display:none"></canvas>
<div class="btns" style="display:none" id="btns">
  <button class="btn btn_gold" onclick="guardar()">💾 Guardar</button>
  <button class="btn btn_share" onclick="partilhar()">↗️ Partilhar</button>
</div>

<script>
const params = new URLSearchParams(window.location.search)
const barb_id = params.get('b') || ''
const barb_nome = decodeURIComponent(params.get('n') || 'A minha barbearia')
const link_url = 'https://anderson17quadri-cmd.github.io/pre-os-/cliente.html?b=' + barb_id

const SCALE = 3
const W = 400
const H = 600
const canvas = document.getElementById('preview')
canvas.width = W * SCALE
canvas.height = H * SCALE
canvas.style.width = W + 'px'
canvas.style.height = H + 'px'
const ctx = canvas.getContext('2d')
ctx.scale(SCALE, SCALE)

const qr_img = new Image()
qr_img.crossOrigin = 'anonymous'
qr_img.onload = () => {
  desenhar(qr_img)
  document.getElementById('loading').style.display = 'none'
  canvas.style.display = 'block'
  document.getElementById('btns').style.display = 'flex'
}
qr_img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=' + encodeURIComponent(link_url) + '&bgcolor=ffffff&color=0a0a0a&margin=8'

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r)
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r)
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r)
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r)
  ctx.closePath()
}

function desenhar(qr) {
  // === FUNDO ===
  ctx.fillStyle = '#080808'
  ctx.fillRect(0, 0, W, H)

  // Textura de fundo - gradiente radial subtil
  const bg_grad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.8)
  bg_grad.addColorStop(0, 'rgba(201,168,76,0.06)')
  bg_grad.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = bg_grad
  ctx.fillRect(0, 0, W, H)

  // === BORDA DOURADA ===
  const border_grad = ctx.createLinearGradient(0,0,W,H)
  border_grad.addColorStop(0, '#C9A84C')
  border_grad.addColorStop(0.5, '#E8C96A')
  border_grad.addColorStop(1, '#8B6914')
  ctx.strokeStyle = border_grad
  ctx.lineWidth = 2
  rr(ctx, 2, 2, W-4, H-4, 18)
  ctx.stroke()

  // === TOPO — POWERED BY ===
  ctx.fillStyle = 'rgba(201,168,76,0.45)'
  ctx.font = '700 10px Inter'
  ctx.textAlign = 'center'
  ctx.letterSpacing = '3px'
  ctx.fillText('P O W E R E D   B Y', W/2, 36)

  // === LOGO AGENDAMENTO.PT ===
  ctx.font = 'italic 700 32px Georgia, serif'
  ctx.textAlign = 'left'
  const t1 = 'Agendamento'
  const t2 = '.pt'
  const w1 = ctx.measureText(t1).width
  const w2 = ctx.measureText(t2).width
  const lx = W/2 - (w1+w2)/2
  ctx.fillStyle = '#f0f0f0'
  ctx.fillText(t1, lx, 70)
  ctx.fillStyle = '#C9A84C'
  ctx.fillText(t2, lx + w1, 70)

  // Linha separadora topo
  const sep_grad = ctx.createLinearGradient(0,0,W,0)
  sep_grad.addColorStop(0, 'rgba(201,168,76,0)')
  sep_grad.addColorStop(0.5, 'rgba(201,168,76,0.4)')
  sep_grad.addColorStop(1, 'rgba(201,168,76,0)')
  ctx.strokeStyle = sep_grad
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(30,90); ctx.lineTo(W-30,90); ctx.stroke()

  // === NOME DA BARBEARIA ===
  ctx.textAlign = 'center'
  const nome_size = barb_nome.length > 18 ? 22 : barb_nome.length > 12 ? 28 : 34
  ctx.font = `700 ${nome_size}px Georgia, serif`
  ctx.fillStyle = '#f0f0f0'
  ctx.fillText(barb_nome, W/2, 130)

  // Tagline
  ctx.fillStyle = 'rgba(201,168,76,0.7)'
  ctx.font = '600 10px Inter'
  ctx.fillText('AGENDA ONLINE · 24 HORAS', W/2, 155)

  // === QR CODE — fundo branco arredondado ===
  const qr_size = 200
  const qr_x = W/2 - qr_size/2
  const qr_y = 180

  // Sombra dourada
  ctx.shadowColor = 'rgba(201,168,76,0.25)'
  ctx.shadowBlur = 24
  ctx.fillStyle = '#ffffff'
  rr(ctx, qr_x-12, qr_y-12, qr_size+24, qr_size+24, 16)
  ctx.fill()
  ctx.shadowBlur = 0

  // QR image
  ctx.drawImage(qr, qr_x, qr_y, qr_size, qr_size)

  // Cantos decorativos dourados
  const c = 16, t = 3
  const cx = qr_x-14, cy = qr_y-14, cs = qr_size+28
  ctx.strokeStyle = '#C9A84C'
  ctx.lineWidth = t
  ;[
    [cx, cy+c, cx, cy, cx+c, cy],
    [cx+cs-c, cy, cx+cs, cy, cx+cs, cy+c],
    [cx, cy+cs-c, cx, cy+cs, cx+c, cy+cs],
    [cx+cs-c, cy+cs, cx+cs, cy+cs, cx+cs, cy+cs-c]
  ].forEach(([x1,y1,x2,y2,x3,y3]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke()
  })

  // === INSTRUÇÃO ===
  ctx.fillStyle = 'rgba(255,255,255,0.6)'
  ctx.font = '400 13px Inter'
  ctx.textAlign = 'center'
  ctx.fillText('📱 Aponta a câmara e marca em segundos', W/2, 430)

  // Linha separadora rodapé
  ctx.strokeStyle = sep_grad
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(30,455); ctx.lineTo(W-30,455); ctx.stroke()

  // === RODAPÉ ===
  ctx.font = 'italic 700 18px Georgia, serif'
  ctx.textAlign = 'left'
  const r1 = 'Agenda'
  const r2 = 'mento'
  const r3 = '.pt'
  const rw1 = ctx.measureText(r1).width
  const rw2 = ctx.measureText(r2).width
  const rw3 = ctx.measureText(r3).width
  const rx = W/2 - (rw1+rw2+rw3)/2
  ctx.fillStyle = '#C9A84C'
  ctx.fillText(r1, rx, 490)
  ctx.fillStyle = 'rgba(255,255,255,0.7)'
  ctx.fillText(r2, rx+rw1, 490)
  ctx.fillStyle = '#C9A84C'
  ctx.fillText(r3, rx+rw1+rw2, 490)

  // Slogan rodapé
  ctx.font = '400 11px Inter'
  ctx.fillStyle = 'rgba(201,168,76,0.5)'
  ctx.textAlign = 'center'
  ctx.fillText('A ferramenta dos melhores barbeiros.', W/2, 515)
}

async function guardar() {
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'))
  const nome_ficheiro = 'cartaz-' + barb_nome.toLowerCase().replace(/\s+/g,'-') + '.png'
  const file = new File([blob], nome_ficheiro, { type: 'image/png' })
  if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Cartaz ' + barb_nome })
  } else {
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = nome_ficheiro; a.click()
    URL.revokeObjectURL(url)
  }
}

async function partilhar() {
  if(navigator.share) {
    await navigator.share({ title: 'Agendamento.pt — ' + barb_nome, text: 'Marca o teu próximo corte online!', url: link_url })
  } else { guardar() }
}
</script>
</body>
</html>
