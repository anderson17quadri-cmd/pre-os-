<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartaz QR — Agendamento.pt</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:16px; }
canvas#preview { border-radius:16px; max-width:100%; box-shadow:0 20px 60px rgba(0,0,0,.6); }
.btns { display:flex; gap:10px; width:100%; max-width:360px; }
.btn { flex:1; padding:15px; border:none; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; font-family:'Inter',sans-serif; }
.btn_gold { background:linear-gradient(135deg,#C9A84C,#E8C96A); color:#000; }
.btn_share { background:#1e1e1e; color:#f0f0f0; border:1px solid #333; }
#loading { color:#888; font-size:14px; }
</style>
</head>
<body>

<div id="loading">A gerar cartaz...</div>
<canvas id="preview" style="display:none"></canvas>
<div class="btns" style="display:none" id="btns">
  <button class="btn btn_gold" onclick="guardar()">💾 Guardar imagem</button>
  <button class="btn btn_share" onclick="partilhar()">↗️ Partilhar</button>
</div>

<script>
const params = new URLSearchParams(window.location.search)
const barb_id = params.get('b') || ''
const barb_nome = decodeURIComponent(params.get('n') || 'A minha barbearia')
const link_url = 'https://anderson17quadri-cmd.github.io/pre-os-/cliente.html?b=' + barb_id

const W = 800
const H = 1000
const canvas = document.getElementById('preview')
canvas.width = W
canvas.height = H
const ctx = canvas.getContext('2d')

// Carregar QR code como imagem
const qr_src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(link_url) + '&bgcolor=ffffff&color=111111&margin=10'
const qr_img = new Image()
qr_img.crossOrigin = 'anonymous'

qr_img.onload = function() {
  desenhar(qr_img)
  document.getElementById('loading').style.display = 'none'
  canvas.style.display = 'block'
  document.getElementById('btns').style.display = 'flex'
}

qr_img.onerror = function() {
  document.getElementById('loading').textContent = 'Erro ao carregar QR. Verifica a ligação.'
}

qr_img.src = qr_src

function desenhar(qr) {
  // Fundo preto
  ctx.fillStyle = '#0a0a0a'
  ctx.fillRect(0, 0, W, H)

  // Moldura dourada gradiente
  const grad = ctx.createLinearGradient(0, 0, W, H)
  grad.addColorStop(0, '#C9A84C')
  grad.addColorStop(0.3, '#E8C96A')
  grad.addColorStop(0.6, '#C9A84C')
  grad.addColorStop(1, '#8B6914')
  ctx.strokeStyle = grad
  ctx.lineWidth = 6
  roundRect(ctx, 6, 6, W-12, H-12, 24)
  ctx.stroke()

  // Linha separadora topo
  ctx.strokeStyle = 'rgba(201,168,76,0.3)'
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.moveTo(40, 180)
  ctx.lineTo(W-40, 180)
  ctx.stroke()

  // TOPO — "powered by"
  ctx.fillStyle = 'rgba(201,168,76,0.5)'
  ctx.font = '600 22px Inter, sans-serif'
  ctx.textAlign = 'center'
  ctx.fillText('POWERED BY', W/2, 70)

  // TOPO — Logo Agendamento.pt
  ctx.fillStyle = '#f0f0f0'
  ctx.font = 'italic 700 52px Georgia, serif'
  ctx.textAlign = 'center'
  // "Agendamento"
  ctx.fillText('Agendamento', W/2 - 30, 135)
  // ".pt" em dourado
  ctx.fillStyle = '#C9A84C'
  const w1 = ctx.measureText('Agendamento').width
  ctx.font = 'italic 700 52px Georgia, serif'
  // Desenhar junto
  ctx.fillStyle = '#f0f0f0'
  const texto_completo = 'Agendamento.pt'
  const w_total = ctx.measureText(texto_completo).width
  ctx.fillText('Agendamento', W/2 - w_total/2 + ctx.measureText('Agendamento').width/2 - ctx.measureText('Agendamento').width/2, 135)
  
  // Limpar e redesenhar logo corretamente
  ctx.fillStyle = '#0a0a0a'
  ctx.fillRect(40, 85, W-80, 70)
  
  // Logo bicolor
  ctx.font = 'italic 700 54px Georgia, serif'
  ctx.textAlign = 'center'
  const part1 = 'Agendamento'
  const part2 = '.pt'
  const w_part1 = ctx.measureText(part1).width
  const w_part2 = ctx.measureText(part2).width
  const total_w = w_part1 + w_part2
  const start_x = W/2 - total_w/2
  
  ctx.fillStyle = '#f0f0f0'
  ctx.textAlign = 'left'
  ctx.fillText(part1, start_x, 138)
  ctx.fillStyle = '#C9A84C'
  ctx.fillText(part2, start_x + w_part1, 138)

  // NOME DA BARBEARIA
  ctx.textAlign = 'center'
  ctx.fillStyle = '#f0f0f0'
  
  // Ajustar tamanho do font ao comprimento do nome
  const nome_size = barb_nome.length > 20 ? 36 : barb_nome.length > 14 ? 42 : 50
  ctx.font = `700 ${nome_size}px Georgia, serif`
  ctx.fillText(barb_nome, W/2, 250)

  // Tagline
  ctx.fillStyle = 'rgba(201,168,76,0.8)'
  ctx.font = '600 20px Inter, sans-serif'
  ctx.letterSpacing = '3px'
  ctx.fillText('MARCA O TEU CORTE ONLINE', W/2, 295)

  // QR code fundo branco arredondado
  const qr_size = 300
  const qr_x = W/2 - qr_size/2
  const qr_y = 330

  // Sombra do QR
  ctx.shadowColor = 'rgba(201,168,76,0.3)'
  ctx.shadowBlur = 30
  ctx.fillStyle = '#ffffff'
  roundRect(ctx, qr_x - 16, qr_y - 16, qr_size + 32, qr_size + 32, 20)
  ctx.fill()
  ctx.shadowBlur = 0

  // QR image
  ctx.drawImage(qr, qr_x, qr_y, qr_size, qr_size)

  // Cantos dourados no QR
  const canto = 20
  const espessura = 4
  ctx.strokeStyle = '#C9A84C'
  ctx.lineWidth = espessura
  const cx = qr_x - 18, cy = qr_y - 18, cw = qr_size + 36, ch = qr_size + 36
  // TL
  ctx.beginPath(); ctx.moveTo(cx, cy+canto); ctx.lineTo(cx, cy); ctx.lineTo(cx+canto, cy); ctx.stroke()
  // TR
  ctx.beginPath(); ctx.moveTo(cx+cw-canto, cy); ctx.lineTo(cx+cw, cy); ctx.lineTo(cx+cw, cy+canto); ctx.stroke()
  // BL
  ctx.beginPath(); ctx.moveTo(cx, cy+ch-canto); ctx.lineTo(cx, cy+ch); ctx.lineTo(cx+canto, cy+ch); ctx.stroke()
  // BR
  ctx.beginPath(); ctx.moveTo(cx+cw-canto, cy+ch); ctx.lineTo(cx+cw, cy+ch); ctx.lineTo(cx+cw, cy+ch-canto); ctx.stroke()

  // Linha separadora rodapé
  ctx.strokeStyle = 'rgba(201,168,76,0.3)'
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.moveTo(40, 820)
  ctx.lineTo(W-40, 820)
  ctx.stroke()

  // Instrução
  ctx.fillStyle = '#888'
  ctx.font = '400 22px Inter, sans-serif'
  ctx.textAlign = 'center'
  ctx.fillText('📱 Aponta a câmara e marca em segundos', W/2, 870)

  // URL mini
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.font = '400 14px Inter, sans-serif'
  ctx.fillText(link_url, W/2, 920)

  // Marca rodapé pequena
  ctx.fillStyle = 'rgba(201,168,76,0.4)'
  ctx.font = '600 16px Inter, sans-serif'
  ctx.fillText('agendamento.pt', W/2, 965)
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x + r, y)
  ctx.lineTo(x + w - r, y)
  ctx.quadraticCurveTo(x + w, y, x + w, y + r)
  ctx.lineTo(x + w, y + h - r)
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
  ctx.lineTo(x + r, y + h)
  ctx.quadraticCurveTo(x, y + h, x, y + h - r)
  ctx.lineTo(x, y + r)
  ctx.quadraticCurveTo(x, y, x + r, y)
  ctx.closePath()
}

async function guardar() {
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'))
  const file = new File([blob], 'agendamento-' + barb_nome.toLowerCase().replace(/\s+/g,'-') + '.png', { type: 'image/png' })
  
  if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Cartaz ' + barb_nome })
  } else {
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = file.name; a.click()
    URL.revokeObjectURL(url)
  }
}

async function partilhar() {
  if(navigator.share) {
    await navigator.share({
      title: 'Agendamento.pt — ' + barb_nome,
      text: 'Marca o teu próximo corte online!',
      url: link_url
    })
  } else {
    guardar()
  }
}
</script>
</body>
</html>
