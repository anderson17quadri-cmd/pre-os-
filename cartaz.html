<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartaz QR — Agendamento.pt</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      gap: 24px;
    }

    /* ───── CARTAZ ───── */
    .cartaz {
      background: #fff;
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    /* topo escuro */
    .topo {
      background: #111;
      padding: 28px 24px 22px;
      text-align: center;
      position: relative;
    }
    .topo::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    }

    .logo-linha {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icone {
      width: 38px; height: 38px;
      background: #C9A84C;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-nome {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .logo-nome span { color: #C9A84C; }

    .topo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* corpo */
    .corpo {
      padding: 28px 24px 24px;
      text-align: center;
    }

    .nome-barbearia {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .nome-sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 24px;
    }

    /* caixa QR */
    .qr-caixa {
      background: #fafafa;
      border: 2px solid #ececec;
      border-radius: 14px;
      padding: 18px;
      display: inline-block;
      margin-bottom: 22px;
    }
    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode canvas,
    #qrcode img { border-radius: 6px; display: block; }

    /* passos */
    .passos {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      text-align: left;
    }
    .passo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .passo-num {
      width: 26px; height: 26px;
      background: #C9A84C;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .passo-txt {
      font-size: 13px;
      color: #444;
      line-height: 1.4;
    }

    /* url */
    .url-caixa {
      background: #111;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 11px;
      color: #C9A84C;
      font-family: monospace;
      word-break: break-all;
      text-align: left;
    }

    /* rodapé */
    .rodape {
      background: #f5f5f5;
      padding: 14px 24px;
      text-align: center;
      border-top: 1px solid #eee;
    }
    .rodape p {
      font-size: 12px;
      color: #bbb;
    }
    .rodape strong { color: #C9A84C; }

    /* ───── BOTÕES (não aparecem no print) ───── */
    .botoes {
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ouro  { background: #C9A84C; color: #fff; }
    .btn-bco   { background: #fff; color: #111; border: 2px solid #ddd; }

    /* print */
    @media print {
      body { background: #fff; padding: 0; justify-content: flex-start; }
      .botoes { display: none; }
      .cartaz { box-shadow: none; max-width: 100%; border-radius: 0; }
    }
  </style>
</head>
<body>

  <div class="cartaz" id="cartaz">

    <div class="topo">
      <div class="logo-linha">
        <div class="logo-icone">✂️</div>
        <div class="logo-nome">Agendamento<span>.pt</span></div>
      </div>
      <p class="topo-sub">Marcações Online</p>
    </div>

    <div class="corpo">
      <div class="nome-barbearia" id="nomeBarbearia">A carregar…</div>
      <div class="nome-sub">Agende o seu corte em segundos</div>

      <div class="qr-caixa">
        <div id="qrcode"></div>
      </div>

      <div class="passos">
        <div class="passo">
          <div class="passo-num">1</div>
          <div class="passo-txt">Aponte a câmara para o QR Code</div>
        </div>
        <div class="passo">
          <div class="passo-num">2</div>
          <div class="passo-txt">Escolha o serviço e o profissional</div>
        </div>
        <div class="passo">
          <div class="passo-num">3</div>
          <div class="passo-txt">Selecione o dia e hora e confirme</div>
        </div>
      </div>

      <div class="url-caixa" id="urlCaixa">a carregar…</div>
    </div>

    <div class="rodape">
      <p>Powered by <strong>Agendamento.pt</strong></p>
    </div>

  </div>

  <div class="botoes">
    <button class="btn btn-bco" onclick="window.print()">🖨️ Imprimir</button>
    <button class="btn btn-ouro" onclick="window.open(document.getElementById('urlCaixa').textContent,'_blank')">🔗 Abrir Link</button>
  </div>

  <script>
    const SUPABASE_URL  = `https://ogtyffrokangokeqlufr.supabase.co`;
    const ANON_KEY      = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndHlmZnJva2FuZ29rZXFsdWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzE1NjIsImV4cCI6MjA5ODA0NzU2Mn0.fdHAQlS9OM0bEwjpPB0rJOSFPlhhX7gButoxPWy-Fts`;

    const params        = new URLSearchParams(window.location.search);
    const barbeariaId   = params.get(`b`) || `5869cba6-8b3a-4fe5-9cfc-e0733c97e831`;
    const clienteUrl    = `https://anderson17quadri-cmd.github.io/pre-os-/cliente.html?b=${barbeariaId}`;

    // QR Code
    document.getElementById(`urlCaixa`).textContent = clienteUrl;
    new QRCode(document.getElementById(`qrcode`), {
      text:         clienteUrl,
      width:        200,
      height:       200,
      colorDark:    `#111111`,
      colorLight:   `#ffffff`,
      correctLevel: QRCode.CorrectLevel.H
    });

    // Nome da barbearia
    async function carregarNome() {
      try {
        const res  = await fetch(
          `${SUPABASE_URL}/rest/v1/barbearias?id=eq.${barbeariaId}&select=nome`,
          { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
        );
        const data = await res.json();
        document.getElementById(`nomeBarbearia`).textContent =
          (data && data[0] && data[0].nome) ? data[0].nome : `Barbearia`;
      } catch {
        document.getElementById(`nomeBarbearia`).textContent = `Barbearia`;
      }
    }
    carregarNome();
  </script>

</body>
</html>
